<div class="container">
    <div id="landing" class="room">
        <h1 class="landing-title">Liminal Labyrinth</h1>

<script>
// Image URLs for play and pause state
const PLAY_ICON_URL = "https://github.com/ChrisYepYep/LiminalLabyrinth/blob/main/images/playicon.png?raw=true";
const PAUSE_ICON_URL = "https://github.com/ChrisYepYep/LiminalLabyrinth/blob/main/images/pauseicon.png?raw=true";

// Toggle audio play/pause for the button clicked
function toggleAudio(btn) {
    const room = btn.closest('.room');
    const audio = room ? room.querySelector('audio') : null;

    if (!audio) return;

    if (audio.paused) {
        // Stop other playing audio across rooms, but DO NOT reset currentTime
        document.querySelectorAll('audio').forEach(a => {
            if (a !== audio) {
                a.pause();
            }
        });

        // Reset all other audio buttons to play icon
        document.querySelectorAll('.audio-toggle-btn').forEach(b => {
            if (b !== btn) {
                b.innerHTML = `<img class="audio-icon" src="${PLAY_ICON_URL}" alt="Play Icon" style="width: 24px; height: 24px; vertical-align: middle; display: block; margin: 0 auto;">`;
                b.classList.remove('playing');
            }
        });

        // Resume/Play current audio from where it was paused
        audio.play();
        btn.innerHTML = `<img class="audio-icon" src="${PAUSE_ICON_URL}" alt="Pause Icon" style="width: 24px; height: 24px; vertical-align: middle; display: block; margin: 0 auto;">`;
        btn.classList.add('playing');
    } else {
        // Simply pause current audio (currentTime stays right where it is)
        audio.pause();
        btn.innerHTML = `<img class="audio-icon" src="${PLAY_ICON_URL}" alt="Play Icon" style="width: 24px; height: 24px; vertical-align: middle; display: block; margin: 0 auto;">`;
        btn.classList.remove('playing');
    }
}

// Function to switch rooms
function goToRoom(roomId) {
    // 1. Pause all audio elements when switching rooms
    const allAudio = document.querySelectorAll('audio');
    allAudio.forEach(audio => {
        audio.pause();
        audio.currentTime = 0; // Keeps audio reset when changing room levels
    });

    // 2. Reset all audio button icons back to play icon
    const allAudioBtns = document.querySelectorAll('.audio-toggle-btn');
    allAudioBtns.forEach(btn => {
        btn.innerHTML = `<img class="audio-icon" src="${PLAY_ICON_URL}" alt="Play Icon" style="width: 24px; height: 24px; vertical-align: middle; display: block; margin: 0 auto;">`;
        btn.classList.remove('playing');
    });

    // 3. Force-stop all YouTube iframe playback if present
    const allIframes = document.querySelectorAll('iframe');
    allIframes.forEach(iframe => {
        const currentSrc = iframe.src;
        iframe.src = '';
        iframe.src = currentSrc;
    });

    // 4. Hide all rooms
    const rooms = document.querySelectorAll('.room');
    rooms.forEach(room => {
        room.classList.remove('active');
    });

    // 5. Show the target room & store room ID in localStorage
    const activeRoom = document.getElementById(roomId);
    if (activeRoom) {
        activeRoom.classList.add('active');
        localStorage.setItem('currentRoom', roomId);
    }
}

    function resetProgress() {
    // Confirm with the user before wiping progress
    if (confirm("Sure?")) {
        // Clear the stored room from localStorage
        localStorage.removeItem('currentRoom');
        
        // Return to landing screen
        goToRoom('landing');
    }
}

let transitionComplete = false;

function handleLandingClick() {
    // If the transition has already taken place, reload the page on click
    if (transitionComplete) {
        window.location.reload();
        return;
    }

    const titleElement = document.querySelector('.landing-title');
    const landingContainer = document.getElementById('landing');
    const landingImage = document.querySelector('.room0-image');

    if (titleElement) {
        let currentText = titleElement.textContent;

        // Remove one character per click
        if (currentText.length > 0) {
            titleElement.textContent = currentText.slice(0, -1);
        }

        // When the last letter is removed:
        if (titleElement.textContent.trim().length === 0) {
            titleElement.innerHTML = '&nbsp;'; // Reserve vertical space

            if (landingImage && landingContainer) {
                // 1. Place the new image on #landing (behind the mask)
                landingContainer.style.backgroundImage = "url('https://github.com/ChrisYepYep/LiminalLabyrinth/blob/main/roomassets/expanse.png?raw=true')";
                landingContainer.style.backgroundSize = "contain";
                landingContainer.style.backgroundPosition = "center";
                landingContainer.style.backgroundRepeat = "no-repeat";

                // 2. Fade out Figment.png underneath mask
                landingImage.classList.add('fade-underneath');
            }

            // 3. Mark transition as complete after 3s fade finishes
            setTimeout(() => {
                transitionComplete = true;
            }, 3000);
        }
    }
}

// Automatically restore the last active room on page reload
window.addEventListener('DOMContentLoaded', () => {
    const savedRoom = localStorage.getItem('currentRoom');
    if (savedRoom && document.getElementById(savedRoom)) {
        goToRoom(savedRoom);
    } else {
        goToRoom('landing');
    }
});
</script>
