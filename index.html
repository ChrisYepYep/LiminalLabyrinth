<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Labyrinth</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans MT Condensed', 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
            background-color: #000000;
            color: #fff8fa;
            text-shadow: 0 0 4px rgba(255, 248, 250, 0.3), 0 0 12px rgba(255, 248, 250, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Purely transparent container wrapper */
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        /* Room Transition Logic */
        .room {
            display: none; /* Hide all rooms by default */
        }

        /* ================= LANDING SCREEN ================= */
        #landing.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 2.2s ease-in-out;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        /* ================= PLAYABLE ROOMS ================= */
        .room:not(#landing).active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 4.2s ease-in-out;
            background: #000000;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 248, 250, 0.1);
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Landing Screen Title (Softer glow & Case-sensitive) */
        .landing-title {
            font-size: 3.8rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: #fff8fa;
            text-shadow: 0 0 10px rgba(255, 248, 250, 0.5), 0 0 20px rgba(255, 248, 250, 0.15);
        }

        .landing-text {
            font-size: 1rem;
            letter-spacing: 0px;
            margin-bottom: 30px;
            color: #fff8fa;
            text-shadow: 0 0 10px rgba(255, 248, 250, 0.5), 0 0 20px rgba(255, 248, 250, 0.15);
        }

        /* Elements Styling */
        h1 {
            font-size: 2.4rem; 
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #fff8fa;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(255, 248, 250, 0.4), 0 0 15px rgba(255, 248, 250, 0.15);
        }

        p {
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .room-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 5px;
            border: 2px solid rgba(255, 248, 250, 0.2);
            box-shadow: 0 0 15px rgba(255, 248, 250, 0.1); 
        }

        .crop {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 5px;
            border: 2px solid rgba(255, 248, 250, 0.2);
            box-shadow: 0 0 15px rgba(255, 248, 250, 0.1); 
        }

        /* YouTube Container */
        .audio-player-container {
            margin: 20px 0;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 248, 250, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        iframe {
            border: none;
            width: 100%;
            height: 80px; 
            border-radius: 4px;
        }

        /* Buttons */
        .nav-btn {
            background-color: transparent;
            color: #fff8fa;
            border: transparent;
            padding: 8px 20px;
            font-family: 'Gill Sans MT Condensed', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.8s ease-in-out;
            margin-top: 15px;
            margin-bottom: 1px;
            box-shadow: none;
            text-transform: none;
            text-shadow: 0 0 4px rgba(255, 248, 250, 0.4), 0 0 15px rgba(255, 248, 250, 0.15);
        }

        .btn-sub {
            font-size: 0.85rem;
            font-weight: bold;
            opacity: 0.7;
            margin-top: 1px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 4px rgba(255, 248, 250, 0.4), 0 0 15px rgba(255, 248, 250, 0.15);
}

        .nav-btn:hover {
            background-color: transparent;
            box-shadow: none;
            transform: translateY(-3px);
            text-shadow: 0 0 10px rgba(255, 248, 250, 0.4), 0 0 15px rgba(255, 248, 250, 0.15);
        }

        .nav-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">

    <div id="landing" class="room active">
        <h1 class="landing-title">Liminal Labyrinth</h1>
        <button class="nav-btn" onclick="window.location.reload()">
            <span class="btn-main">It is time to wake up.</span><br>
            <span class="btn-sub">Coming August 2026.</span>
        </button>
    </div>


</div>

<script>
    // JavaScript function to switch between rooms
    function goToRoom(roomId) {
        // Find all elements with the class 'room' and hide them
        const rooms = document.querySelectorAll('.room');
        rooms.forEach(room => {
            room.classList.remove('active');
        });

        // Show the selected room
        const activeRoom = document.getElementById(roomId);
        if (activeRoom) {
            activeRoom.classList.add('active');
        }
    }
</script>

</body>
</html>
